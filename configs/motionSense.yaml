# MotionSense Dataset Configuration
# Real-world iPhone sensor data - "In the Wild" HAR

data:
  dataset: motionsense
  root: ./datasets/motion-sense-master
  batchSize: 64
  numWorkers: 2
  augment: true
  windowSize: 128
  stride: 64

model:
  numClasses: 6
  inChannels: 6  # acc_xyz + gyro_xyz
  seqLen: 128
  variant: nano
  # ========== GOLDEN CONFIG (LOCKED) ==========
  # These architectural parameters are FIXED across all datasets
  # to demonstrate robustness. Only training params are tuned via HPO.
  dModel: 24        # LOCKED - Model dimension
  nLayers: 2        # LOCKED - Number of distinct SSM blocks
  dState: 16        # LOCKED - SSM state dimension
  expand: 2         # LOCKED - Expansion factor
  # =============================================
  stemType: spectral

training:
  epochs: 100
  lr: 0.001
  weightDecay: 0.01
  optimizer: adamw
  scheduler: cosine
  warmupEpochs: 5
  mixedPrecision: true

logging:
  saveEvery: 10
  logEvery: 1
